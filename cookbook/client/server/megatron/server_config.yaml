# Twinkle Server Configuration - Tinker-Compatible Transformers Backend

# proxy_location: determines where the HTTP proxy runs.
# "EveryNode" means each Ray node runs its own proxy (good for multi-node).
proxy_location: EveryNode

# HTTP listener settings
http_options:
  host: 0.0.0.0        # Listen on all network interfaces
  port: 9000            # Port number for the server

# Applications: each entry defines a service component deployed on the server
applications:

  # 1. TinkerCompatServer - The central API server
  #    Handles client connections, training run tracking, checkpoint listing.
  - name: server
    route_prefix: /api/v1          # API endpoint prefix (Tinker-compatible)
    import_path: server            # Python module to import
    args:
      server_config:
        per_token_model_limit: 3      # Maximum number of models (adapters) per token (server-globally enforced)

    deployments:
      - name: TinkerCompatServer
        max_ongoing_requests: 50
        autoscaling_config:
          min_replicas: 1                # Minimum number of replicas
          max_replicas: 1                # Maximum number of replicas
          target_ongoing_requests: 128   # Target concurrent requests per replica
        ray_actor_options:
          num_cpus: 0.1                  # CPU resources allocated to this actor
          runtime_env:
            env_vars:
              TWINKLE_TRUST_REMOTE_CODE: "0"
              TWINKLE_LONG_POLL_TIMEOUT: "120"

  # 3. Sampler Service - Runs inference / sampling using vLLM engine
  #    Used for generating text from the model (e.g., evaluating LoRA results).
  #    Config: TP=2 x DP=2 on 4 GPUs, ~27GB weights/GPU, ~37GB for KV cache + LoRA
  - name: sampler-Qwen3.6-35B-A3B
    route_prefix: /api/v1/sampler/Qwen/Qwen3.6-35B-A3B
    import_path: sampler
    args:
      model_id: "ms://Qwen/Qwen3.6-35B-A3B"  # ModelScope model identifier
      nproc_per_node: 4               # Number of GPU processes per node
      sampler_type: vllm              # Inference engine: 'vllm' (fast) or 'torch' (TorchSampler)
      engine_args:                    # vLLM engine-specific settings
        max_model_len: 32000           # Maximum sequence length the engine supports
        gpu_memory_utilization: 0.80   # 80% utilization, ~64GB/GPU, leaves buffer for safety
        enable_lora: true             # Allow loading LoRA adapters during inference
        max_loras: 5                  # Max allowed loras working on vLLM at the same time
        max_lora_rank: 32             # Support up to rank 64 LoRA adapters
        enable_tower_connector_lora: true
      device_group:                   # Logical device group for the sampler
        name: sampler
        gpus_per_worker: 2
        ranks: 4                   # GPU rank indices to use
        device_type: cuda
      device_mesh:
        device_type: cuda
        dp_size: 2
        tp_size: 2                  # 2 TP replicas for multi-tenant throughput
      queue_config:
        rps_limit: 20                               # Max requests per second
        tps_limit: 32000                            # Max tokens per second
        max_input_tokens: 32000
    deployments:
      - name: SamplerManagement
        autoscaling_config:
          min_replicas: 1
          max_replicas: 1
          target_ongoing_requests: 16
        ray_actor_options:
          num_cpus: 0.1
          runtime_env:
            env_vars:
              TWINKLE_TRUST_REMOTE_CODE: "0"
              TWINKLE_LONG_POLL_TIMEOUT: "120"

  # 2. Model Service - Hosts the base model for training.
  #    Config: PP=2 x DP=2 on 4 GPUs, ~27GB weights/GPU, comfortable for LoRA training
  - name: models-Qwen3.6-35B-A3B
    route_prefix: /api/v1/model/Qwen/Qwen3.6-35B-A3B
    import_path: model
    args:
      use_megatron: true                          # Use Megatron-LM backend
      model_id: "ms://Qwen/Qwen3.6-35B-A3B" # ModelScope model identifier
      max_length: 32000                           # model max length
      max_loras: 3                                # model max loras
      nproc_per_node: 4                           # Number of GPU processes per node
      device_group:
        name: model
        ranks: 4
        device_type: cuda
      device_mesh:
        device_type: cuda
        tp_size: 2
        ep_size: 2
        pp_size: 2
        sequence_parallel: True

      queue_config:
        rps_limit: 20                               # Max requests per second
        tps_limit: 32000                            # Max tokens per second
        max_input_tokens: 32000
      adapter_config:
        adapter_timeout: 120                       # Seconds before idle adapter unload
        adapter_max_lifetime: 36000               # Maximum lifetime of an adapter in seconds (e.g., 10 hours)
    deployments:
      - name: ModelManagement
        autoscaling_config:
          min_replicas: 1
          max_replicas: 1
          target_ongoing_requests: 8
        ray_actor_options:
          num_cpus: 0.1
          runtime_env:
            env_vars:
              TWINKLE_TRUST_REMOTE_CODE: "0"
              TWINKLE_LONG_POLL_TIMEOUT: "120"

  # 4. Processor Service
  - name: processor
    route_prefix: /api/v1/processor
    import_path: processor
    args:
      ncpu_proc_per_node: 2
      device_group:
        name: model
        ranks: 2
        device_type: CPU
      device_mesh:
        device_type: CPU
        dp_size: 2
    deployments:
      - name: ProcessorManagement
        autoscaling_config:
          min_replicas: 1
          max_replicas: 1
          target_ongoing_requests: 128
        ray_actor_options:
          num_cpus: 0.1
